<!DOCTYPE html>
<html lang="en">
<head>

<body>

<table border="1" width="900" align="center" cellpadding="0" cellspacing="0">

                    <tr>

            <br><b>SELECT YOUR GEAR</b><br><br>
            
            <table border="0" width="90%" cellpadding="10">
                <tr align="center">

                        <img src="../img/jokermask.webp" width="120" height="120" style="border-radius: 50%; object-fit: cover; border: 2px solid black;"><br>

                    <td>
